// ─── Notificaciones matutinas ─────────────────────────────────────────────────
const MORNING_NOTIF_KEY = 'flojer_morning_notif';

async function scheduleMorningNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'denied') return;

  if (Notification.permission !== 'granted') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
  }

  // Cancel previous scheduled notification
  const existing = localStorage.getItem(MORNING_NOTIF_KEY);
  if (existing) clearTimeout(parseInt(existing));

  // Schedule for 8:00 AM Chile time tomorrow (or today if before 8am)
  const nowCL    = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Santiago' }));
  const target   = new Date(nowCL);
  target.setHours(8, 0, 0, 0);
  if (target <= nowCL) target.setDate(target.getDate() + 1);

  const delay = target.getTime() - nowCL.getTime();

  const tid = setTimeout(async () => {
    await fireMorningNotification();
    // Re-schedule for next day
    scheduleMorningNotification();
  }, delay);

  localStorage.setItem(MORNING_NOTIF_KEY, String(tid));
  console.log('[FlojerApp] Notificación matutina programada para las 08:00');
}

async function fireMorningNotification() {
  try {
    // Fetch today matches
    const todayCL = todayChile();
    let partidos  = [];
    let liveCount = 0;

    await Promise.allSettled(
      ESPN_LEAGUES.slice(0, 10).map(lg =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${lg.slug}/scoreboard`)
          .then(r => r.ok ? r.json() : null)
          .then(d => {
            if (!d) return;
            (d.events || []).forEach(evt => {
              const comp = (evt.competitions || [])[0] || {};
              if (!comp.date) return;
              const evtDate = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Santiago' }).format(new Date(comp.date));
              if (evtDate !== todayCL) return;
              const teams = comp.competitors || [];
              const home  = (teams.find(t => t.homeAway === 'home') || teams[0] || {});
              const away  = (teams.find(t => t.homeAway === 'away') || teams[1] || {});
              const hName = (home.team || {}).shortDisplayName || '?';
              const aName = (away.team || {}).shortDisplayName || '?';
              const time  = chileTime(comp.date) || '';
              partidos.push(`${hName} vs ${aName}${time ? ' · ' + time : ''}`);
            });
          })
          .catch(() => {})
      )
    );

    // Get today's classes
    const diaCapital = DIAS_ES[new Date().getDay()] || '';
    const clases = [];
    if (uniState.currentUser && uniState.users[uniState.currentUser]) {
      const ramos = uniState.users[uniState.currentUser].ramos || [];
      for (const r of ramos) {
        for (const b of (r.horario || [])) {
          if (b.dia === diaCapital) {
            clases.push(`${b.inicio} ${r.nombre.split(' ')[0]}`);
          }
        }
      }
      clases.sort();
    }

    // Build notification body
    let body = '';
    if (clases.length) {
      body += `Clases: ${clases.slice(0, 3).join(' · ')}
`;
    } else {
      body += 'Sin clases hoy. ';
    }
    if (partidos.length) {
      body += `Partidos: ${partidos.slice(0, 3).join(' · ')}`;
      if (partidos.length > 3) body += ` y ${partidos.length - 3} más`;
    } else {
      body += 'Sin partidos hoy.';
    }

    new Notification('Buenos días — FlojerApp', {
      body,
      icon:  'apple-touch-icon.png',
      badge: 'apple-touch-icon.png',
      tag:   'flojer-morning',
    });
  } catch(e) {
    console.log('[FlojerApp] Error en notificación matutina:', e);
  }
}

// Toggle desde UI
async function toggleMorningNotif() {
  const btn = document.getElementById('morning-notif-btn');
  const active = localStorage.getItem('flojer_morning_enabled') === '1';

  if (active) {
    // Disable
    const tid = localStorage.getItem(MORNING_NOTIF_KEY);
    if (tid) clearTimeout(parseInt(tid));
    localStorage.removeItem(MORNING_NOTIF_KEY);
    localStorage.setItem('flojer_morning_enabled', '0');
    if (btn) { btn.textContent = 'Activar aviso matutino'; btn.style.color = 'var(--txt2)'; }
    showToast('Aviso matutino desactivado');
  } else {
    // Enable
    await scheduleMorningNotification();
    localStorage.setItem('flojer_morning_enabled', '1');
    if (btn) { btn.textContent = 'Desactivar aviso matutino'; btn.style.color = 'var(--green)'; }
    showToast('Aviso matutino activado — todos los días a las 08:00');
  }
}

        <button onclick="navigator.clipboard?.writeText('${binId}').then(()=>showToast('ID copiado')).catch(()=>{})" style="flex:1;background:var(--accent);border:none;border-radius:3px;color:#fff;padding:10px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600">Copiar ID</button>
        <button onclick="this.closest('.widget-bin-overlay').remove()" style="background:var(--elevated);border:1px solid var(--border);border-radius:3px;color:var(--txt2);padding:10px 14px;cursor:pointer;font-family:var(--font);font-size:13px">Cerrar</button>
      </div>
    </div>`;
  overlay.className = 'widget-bin-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}
window.showWidgetBinId = showWidgetBinId;

// ─── Widget sync — expose bin ID ─────────────────────────────────────────────
function showWidgetSync() {
  const user  = uniState.currentUser;
  if (!user) { showToast('Inicia sesión primero'); return; }
  const binId = getBinId(user);

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:6px;width:100%;max-width:400px;padding:20px">
      <div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px">Sincronizar Widget</div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:16px;line-height:1.6">
        Copia este ID y pégalo en el widget de Scriptable para que lea tus ramos automáticamente.
      </div>
      ${binId ? `
        <div style="background:var(--elevated);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:var(--mono);font-size:12px;color:var(--accent2);word-break:break-all;margin-bottom:12px">${binId}</div>
        <button onclick="navigator.clipboard.writeText('${binId}').then(()=>showToast('ID copiado'))" 
          class="btn-primary" style="width:100%;margin-bottom:8px">Copiar ID</button>
      ` : `
        <div style="background:var(--elevated);border-radius:4px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:12px">
          Sin ID aún — guarda algo primero (añade un ramo o movimiento) para generar tu bin en la nube.
        </div>
      `}
      <button onclick="this.closest('div[style*=fixed]').remove()" 
        style="width:100%;background:none;border:1px solid var(--border);border-radius:4px;padding:10px;color:var(--txt2);cursor:pointer;font-family:var(--font);font-size:13px">Cerrar</button>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}
window.showWidgetSync = showWidgetSync;

async function showBinId() {
  const bins = JSON.parse(localStorage.getItem('mp_bins') || '{}');
  let binId = bins['bpedrazav'] || null;
  if (!binId) {
    showToast('Generando BIN_ID, espera 3 segundos...');
    // Force push with current data to create bin
    if (uniState.currentUser === ADMIN_USER && uniState.users[ADMIN_USER]) {
      await cloudPush(ADMIN_USER);
    } else {
      // Push minimal data to create bin
      const minData = { ramos: [], fin: {} };
      await cloudPushData(ADMIN_USER, minData);
    }
    await new Promise(r => setTimeout(r, 2000));
    const bins2 = JSON.parse(localStorage.getItem('mp_bins') || '{}');
    binId = bins2['bpedrazav'] || null;
  }
  showBinIdModal(binId || 'No se pudo generar — verifica conexión');
}

function showBinIdModal(binId) {
  const existing = document.getElementById('binid-modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'binid-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:6px;padding:24px;width:100%;max-width:400px;border:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">TU BIN ID PARA EL WIDGET</div>
      <div style="background:var(--elevated);border:1px solid var(--border-b);border-radius:4px;padding:12px;font-family:var(--mono);font-size:13px;color:var(--accent2);word-break:break-all;margin-bottom:14px;user-select:all">${binId}</div>
      <p style="font-size:12px;color:var(--txt2);margin-bottom:14px;line-height:1.6">Copia este código y pégalo en la línea <code style="background:var(--elevated);padding:2px 5px;border-radius:2px">const BIN_ID = ""</code> del script FlojerWidget en Scriptable.</p>
      <button onclick="navigator.clipboard.writeText('${binId}').then(()=>showToast('BIN_ID copiado')).catch(()=>{})" 
        style="width:100%;background:var(--accent);border:none;border-radius:3px;color:#fff;padding:11px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px">
        Copiar BIN_ID
      </button>
      <button onclick="document.getElementById('binid-modal').remove()"
        style="width:100%;background:none;border:1px solid var(--border);border-radius:3px;color:var(--txt2);padding:10px;font-family:var(--font);font-size:13px;cursor:pointer">
        Cerrar
      </button>
    </div>`;
  document.body.appendChild(overlay);
}
window.showBinId = showBinId;

function formatCLP(n) {
  return '$' + Math.round(n||0).toLocaleString('es-CL');
}

function mesNombre(yyyymm) {
  const [y,m] = yyyymm.split('-');
  return new Date(+y, +m-1, 1).toLocaleDateString('es-CL', { month:'long', year:'numeric' });
}

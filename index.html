<html lang="es">
<head>

<style>


@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

/* ═══════════════════════════════════════════════════
   FlojerApp — Design System
   Palette: Deep space base, electric violet accent,
   neon green for positive, coral for danger
═══════════════════════════════════════════════════ */
:root {
            --bg:       #09090b;
            --surface:  #0f0f11;
            --card:     #141417;
            --elevated: #1c1c21;
            --border:   #27272a;
            --border-b: #3f3f46;
            --accent:   #6366f1;
            --accent2:  #818cf8;
            --accent3:  #a5b4fc;
            --green:    #22c55e;
            --red:      #ef4444;
            --amber:    #f59e0b;
            --txt:      #fafafa;
            --txt2:     #71717a;
            --muted:    #3f3f46;
            --live-red: #ef4444;
            --font:     'Figtree', system-ui, -apple-system, sans-serif;
            --mono:     'JetBrains Mono', monospace;
            --r:        4px;
            --r-lg:     6px;
            --sb:       env(safe-area-inset-bottom, 0px);
            --st:       env(safe-area-inset-top, 0px);
        }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body {
  height:100%; overflow:hidden;
  background:var(--bg); color:var(--txt);
  font-family:var(--font); font-size:14px;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

/* ── Splash ──────────────────────────────────────── */
#splash {
  position:fixed; inset:0; z-index:1000;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
  transition:opacity .4s;
}
.splash-logo { display:flex; flex-direction:column; align-items:center; gap:14px; }
.splash-logo span { font-size:28px; font-weight:700; letter-spacing:2px; color:var(--txt); }

/* ── App layout ──────────────────────────────────── */
#app { display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }
#app.hidden { display:none; }

/* ── Top bar ─────────────────────────────────────── */
.top-bar {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding-top:max(var(--st),8px);
  flex-shrink:0;
}
.app-title {
  font-size:20px; font-weight:700; letter-spacing:1.5px;
  color:var(--accent3); padding:0 16px 8px;
  display:flex; align-items:center; gap:8px;
}

/* ── Tab nav ─────────────────────────────────────── */
.tab-nav { display:flex; border-top:1px solid var(--border); }
.tab-btn {
  flex:1; background:none; border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px;
  font-family:var(--font); font-size:10px; font-weight:500;
  color:var(--muted); border-bottom:2px solid transparent;
  transition:all .2s; letter-spacing:.5px;
}
.tab-btn.active { color:var(--accent2); border-bottom-color:var(--accent); }
.tab-icon { font-size:18px; }

/* ── Tab content ─────────────────────────────────── */
.tab-content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding-bottom:calc(16px + var(--sb));
  -webkit-overflow-scrolling:touch;
}
.tab-content.hidden { display:none!important; }

/* ── Section header ──────────────────────────────── */
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 16px 8px; gap:8px; flex-wrap:wrap;
}
.section-header h2 { font-size:20px; font-weight:700; letter-spacing:.5px; }
.section-header.col { flex-direction:column; align-items:stretch; }
.date-display {
  font-size:11px; color:var(--txt2);
  background:var(--elevated); padding:4px 10px;
  border-radius:3px; border:1px solid var(--border);
}

/* ── Forms ───────────────────────────────────────── */
.form-input {
  width:100%; background:var(--elevated);
  border:1px solid var(--border); border-radius:var(--r);
  color:var(--txt); padding:10px 13px;
  font-family:var(--font); font-size:14px; outline:none;
  display:block; transition:border-color .2s;
}
.form-input:focus { border-color:var(--border-b); }
.form-input::placeholder { color:var(--muted); }
.form-group { margin-bottom:10px; }
.form-label { display:block; font-size:10px; font-weight:600; color:var(--txt2); margin-bottom:5px; letter-spacing:1px; text-transform:uppercase; }
.form-actions { display:flex; gap:8px; margin-top:4px; }
.btn-primary {
  background:var(--accent); border:none; border-radius:var(--r);
  color:#fff; padding:11px 20px; font-family:var(--font); font-size:14px;
  font-weight:600; cursor:pointer; transition:opacity .2s;
}
.btn-primary:active { opacity:.8; }
.btn-secondary {
  background:var(--elevated); border:1px solid var(--border);
  border-radius:var(--r); color:var(--txt2); padding:11px 16px;
  font-family:var(--font); font-size:14px; cursor:pointer;
}
.icon-btn {
  background:none; border:1px solid var(--border); color:var(--txt2);
  border-radius:4px; width:34px; height:34px; display:flex;
  align-items:center; justify-content:center; cursor:pointer; font-size:14px;
}

/* ── Filters ─────────────────────────────────────── */
.league-filter,.genre-filter {
  display:flex; gap:6px; overflow-x:auto;
  padding:6px 16px; scrollbar-width:none;
}
.league-filter::-webkit-scrollbar,.genre-filter::-webkit-scrollbar { display:none; }
.filter-btn {
  background:var(--elevated); border:1px solid var(--border);
  color:var(--txt2); border-radius:3px; padding:5px 13px;
  font-size:11px; font-weight:500; white-space:nowrap;
  cursor:pointer; font-family:var(--font); transition:all .2s;
}
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── Football ────────────────────────────────────── */
.matches-list { padding:0 0 16px; }
.loading-matches {
  display:flex; flex-direction:column; align-items:center;
  padding:48px 20px; gap:12px; color:var(--muted);
}
.spinner {
  width:28px; height:28px; border:2px solid var(--elevated);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.league-group-header {
  padding:14px 16px 6px; font-size:10px; font-weight:700;
  color:var(--accent2); letter-spacing:1.5px; text-transform:uppercase;
  border-top:1px solid var(--border); margin-top:4px;
}
.league-group-header:first-child { border-top:none; margin-top:0; }

.match-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:4px; padding:12px 14px;
  margin:0 16px 8px; cursor:pointer; transition:border-color .2s, transform .1s;
}
.match-card:active { transform:scale(.99); border-color:var(--border-b); }
.match-card.live { border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.04); }
.match-card.finished { opacity:.75; }

.mc-row { display:flex; align-items:center; gap:8px; }
.mc-team { flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
.mc-team-away { flex-direction:row-reverse; }
.mc-logo { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
.mc-name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mc-center { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; min-width:76px; }
.mc-score { font-size:20px; font-weight:700; font-family:var(--mono); color:var(--txt); letter-spacing:2px; }
.mc-dash { color:var(--muted); font-size:16px; }
.mc-time { font-size:12px; font-weight:600; color:var(--accent2); background:rgba(124,58,237,.15); border:1px solid var(--border-b); padding:4px 8px; border-radius:3px; }
.mc-status-line { font-size:10px; text-align:center; }
.live-badge { color:var(--red); font-weight:700; animation:blink 1.4s infinite; }
.mc-done { color:var(--muted); }
.mc-pre { color:var(--txt2); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }
.mc-footer { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; }
.btn-reminder {
  background:none; border:1px solid var(--border-b); color:var(--accent2);
  border-radius:3px; font-size:11px; padding:4px 10px; cursor:pointer;
  font-family:var(--font); transition:all .2s;
}
.btn-reminder.set { color:var(--green); border-color:var(--green); }

/* ── Match Stats Modal ───────────────────────────── */
.match-modal {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
}
.match-modal-content {
  background:var(--surface); border-radius:3px 20px 0 0;
  width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
  padding-bottom:calc(20px + var(--sb));
}
.ms-header { padding:16px 16px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:1; }
.ms-close { background:none; border:1px solid var(--border); color:var(--muted); border-radius:4px; width:32px; height:32px; cursor:pointer; float:right; font-size:14px; }
.ms-teams-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.ms-team-big { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; font-size:12px; font-weight:600; }
.ms-team-big.right {}
.ms-team-logo { width:40px; height:40px; object-fit:contain; }
.ms-center-block { text-align:center; flex-shrink:0; }
.ms-score { font-size:32px; font-weight:700; font-family:var(--mono); color:var(--txt); }
.ms-upcoming { font-size:14px; color:var(--txt2); }
.ms-status-text { font-size:11px; color:var(--txt2); margin-top:2px; }
.ms-body { padding:14px 16px; }
.ms-section-title { font-size:10px; font-weight:700; color:var(--accent2); letter-spacing:1.5px; text-transform:uppercase; margin:14px 0 8px; }
.ms-goals { display:flex; flex-direction:column; gap:8px; }
.ms-goal-row { display:flex; align-items:center; gap:10px; }
.ms-goal-min { font-size:12px; font-weight:700; color:var(--accent2); font-family:var(--mono); width:30px; flex-shrink:0; }
.ms-goal-icon { font-size:16px; flex-shrink:0; }
.ms-goal-info { flex:1; font-size:13px; font-weight:600; }
.ms-goal-team { font-size:11px; color:var(--txt2); margin-left:6px; font-weight:400; }
.ms-pen { font-size:10px; background:rgba(124,58,237,.2); color:var(--accent2); padding:1px 5px; border-radius:4px; }
.ms-og  { font-size:10px; background:rgba(239,68,68,.2); color:var(--red); padding:1px 5px; border-radius:4px; }
.ms-stats { display:flex; flex-direction:column; gap:6px; }
.ms-stat-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.ms-stat-val { font-size:14px; font-weight:700; font-family:var(--mono); width:40px; flex-shrink:0; }
.ms-stat-val.home { text-align:left; }
.ms-stat-val.away { text-align:right; }
.ms-stat-label { flex:1; font-size:12px; color:var(--txt2); text-align:center; }
.ms-empty { font-size:12px; color:var(--muted); text-align:center; padding:8px 0; }

/* ── IPTV ────────────────────────────────────────── */
.iptv-tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
.iptv-tab {
  flex:1; background:none; border:none; cursor:pointer;
  padding:11px 8px; font-family:var(--font); font-size:12px;
  font-weight:500; color:var(--muted); border-bottom:2px solid transparent; transition:all .2s;
}
.iptv-tab.active { color:var(--accent2); border-bottom-color:var(--accent); }
.video-wrapper { position:relative; background:#000; width:100%; aspect-ratio:16/9; }
#iptv-video { width:100%; height:100%; display:block; }
.player-placeholder {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  background:var(--bg); color:var(--muted);
}
.placeholder-icon { font-size:36px; }
.now-playing {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  background:var(--surface); border-bottom:1px solid var(--border);
}
.now-playing-logo {
  width:38px; height:38px; background:var(--accent); border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#fff; text-align:center;
  flex-shrink:0; padding:2px; word-break:break-all;
}
.now-playing-info { flex:1; min-width:0; }
.np-name { font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.np-status { font-size:10px; color:var(--red); font-weight:600; margin-top:2px; }
.np-stop { background:none; border:1px solid var(--border-b); color:var(--red); border-radius:3px; font-size:11px; padding:5px 10px; cursor:pointer; font-family:var(--font); }
.player-error { padding:14px 16px; background:rgba(239,68,68,.08); border-top:1px solid rgba(239,68,68,.3); color:var(--red); font-size:13px; text-align:center; }
.channels-header { padding:12px 16px 4px; }
.search-input {
  width:100%; background:var(--elevated); border:1px solid var(--border);
  border-radius:var(--r); color:var(--txt); padding:10px 13px;
  font-family:var(--font); font-size:14px; outline:none;
}
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:var(--border-b); }
.channels-list { padding:8px 16px; display:flex; flex-direction:column; gap:8px; }
.channel-card {
  display:flex; align-items:center; gap:12px; background:var(--card);
  border:1px solid var(--border); border-radius:4px; padding:12px 14px; transition:border-color .2s;
}
.channel-card:active { border-color:var(--border-b); }
.channel-logo-box {
  width:44px; height:44px; flex-shrink:0; background:var(--accent);
  border-radius:4px; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#fff; text-align:center; word-break:break-all; padding:3px;
}
.channel-info { flex:1; min-width:0; }
.channel-name { font-weight:600; font-size:14px; margin-bottom:2px; }
.channel-url { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.btn-play-ch {
  background:var(--accent); border:none; border-radius:50%; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; font-size:14px; flex-shrink:0;
}
.btn-play-ch:active { opacity:.8; }
.empty-state { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; padding:40px 20px; color:var(--muted); }
.empty-icon { font-size:38px; }
.empty-sub { font-size:12px; }
.settings-section { padding:16px; border-bottom:1px solid var(--border); }
.settings-section h3 { font-size:15px; font-weight:600; color:var(--accent2); margin-bottom:14px; }
.settings-ch-item { display:flex; align-items:center; gap:8px; background:var(--elevated); border-radius:var(--r); padding:10px 12px; margin-bottom:8px; }
.settings-ch-name { flex:1; font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.empty-hint { font-size:12px; color:var(--muted); text-align:center; padding:12px 0; }

/* ── Universidad ─────────────────────────────────── */
.uni-login { max-width:400px; margin:0 auto; padding:32px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.uni-logo { font-size:48px; }
.uni-title { font-size:22px; font-weight:700; letter-spacing:1px; }
.uni-subtitle { font-size:12px; color:var(--muted); margin-top:-8px; }
.uni-section-label { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; width:100%; padding:4px 0 6px; }
.uni-user-list { width:100%; display:flex; flex-direction:column; gap:8px; }
.uni-user-btn {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:4px; padding:12px 14px; display:flex; align-items:center;
  gap:10px; cursor:pointer; font-family:var(--font); transition:border-color .2s;
}
.uni-user-btn:active { border-color:var(--border-b); }
.uni-user-avatar { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.uni-user-avatar.sm { width:30px; height:30px; font-size:11px; }
.uni-user-name { flex:1; font-size:14px; font-weight:600; text-align:left; }
.uni-user-name-sm { font-size:13px; font-weight:600; }
.uni-admin-badge { background:rgba(124,58,237,.2); color:var(--accent2); border:1px solid var(--border-b); border-radius:4px; font-size:10px; padding:2px 6px; font-weight:600; }
.uni-chevron { color:var(--muted); font-size:18px; }
.uni-divider { width:100%; text-align:center; color:var(--muted); font-size:12px; position:relative; padding:4px 0; }
.uni-divider::before,.uni-divider::after { content:''; position:absolute; top:50%; width:44%; height:1px; background:var(--border); }
.uni-divider::before { left:0; } .uni-divider::after { right:0; }
.uni-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
.uni-user-info { display:flex; align-items:center; gap:10px; }
.uni-logout-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:4px; padding:6px 11px; cursor:pointer; font-size:15px; }
.uni-today-card { margin:12px 16px 10px; background:var(--card); border:1px solid var(--border); border-radius:4px; padding:14px 16px; border-left:4px solid var(--accent); }
.uni-today-title { font-size:13px; font-weight:700; color:var(--accent2); margin-bottom:10px; letter-spacing:.5px; }
.uni-today-ramo { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.uni-today-ramo:last-child { border-bottom:none; padding-bottom:0; }
.uni-today-info { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.uni-ramo-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.uni-today-name { font-size:13px; font-weight:600; }
.uni-today-hora { font-size:11px; color:var(--muted); margin-top:1px; }
.uni-today-actions { display:flex; gap:5px; flex-shrink:0; }
.uni-asist-btn { border:none; border-radius:4px; padding:7px 10px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font); transition:all .15s; }
.uni-asist-btn:active { transform:scale(.93); }
.uni-asist-btn.presente { background:#16a34a20; color:#16a34a; border:1px solid #16a34a40; }
.uni-asist-btn.ausente  { background:#dc262620; color:#dc2626; border:1px solid #dc262640; }
.uni-asist-btn.justificado { background:#d9770620; color:#d97706; border:1px solid #d9770640; }
.uni-asist-btn.active-estado { filter:brightness(1.4); }
.uni-no-clases { font-size:13px; color:var(--muted); padding:4px 0; }
.uni-can-skip { margin:0 16px 10px; background:#16a34a0d; border:1px solid #16a34a25; border-radius:4px; padding:10px 12px; font-size:12px; color:var(--txt2); display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.uni-skip-pill { background:#16a34a20; color:#16a34a; border-radius:3px; padding:3px 8px; font-size:11px; font-weight:600; }
.uni-section-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px; font-size:10px; font-weight:700; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
.uni-add-btn { background:var(--accent); border:none; border-radius:4px; color:#fff; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--font); }
.uni-ramo-card { display:flex; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:4px; margin:0 16px 10px; overflow:hidden; cursor:pointer; transition:border-color .2s; }
.uni-ramo-card:active { border-color:var(--border-b); }
.uni-ramo-color { width:4px; align-self:stretch; flex-shrink:0; }
.uni-ramo-info { flex:1; padding:14px 12px; min-width:0; }
.uni-ramo-codigo { font-size:11px; color:var(--muted); margin-bottom:4px; font-family:var(--mono); letter-spacing:.5px; }

<script>
'use strict';

const DIAS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
// ═══════════════════════════════════════════════════════════
//  FlojerApp — Main App JS
// ═══════════════════════════════════════════
// ─── Picture-in-Picture ───────────────────────────────────────────────────────
function setupPiP() {
  const video = document.getElementById('iptv-video');
  if (!video || !document.pictureInPictureEnabled) return;

  // Auto-PiP when app loses focus or user switches tab
  document.addEventListener('visibilitychange', async () => {
    if (document.hidden && !video.paused && video.src && video.readyState >= 2) {
      try {
        await video.requestPictureInPicture();
      } catch(e) {}
    }
  });

  // Exit PiP when user returns to the app
  video.addEventListener('leavepictureinpicture', () => {
    // Resume normally — nothing needed
  });

  // PiP button in the now-playing bar
  video.addEventListener('loadeddata', () => {
    const existing = document.getElementById('pip-btn');
    if (existing || !document.pictureInPictureEnabled) return;
    const np = document.getElementById('now-playing');
    if (!np) return;
    const btn = document.createElement('button');
    btn.id = 'pip-btn';
    btn.title = 'Ventana flotante';
    btn.style.cssText = 'background:none;border:1px solid var(--border);color:var(--txt2);border-radius:3px;padding:5px 8px;cursor:pointer;font-size:11px;margin-right:4px;font-family:var(--font)';
    btn.innerHTML = '⧉ PiP';
    btn.onclick = async () => {
      try {
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
          btn.innerHTML = '⧉ PiP';
        } else {
          await video.requestPictureInPicture();
          btn.innerHTML = '✕ PiP';
        }
      } catch(e) { showToast('PiP no disponible en este dispositivo'); }
    };
    // Insert before stop button
    const stopBtn = np.querySelector('.np-stop');
    if (stopBtn) np.insertBefore(btn, stopBtn);
  });
}

// ─── Vibración en goles ───────────────────────────────────────────────────────
let goalTracker = {}; // matchId -> score string

function checkGoalVibration(grouped) {
  if (!navigator.vibrate) return;

  for (const { events } of grouped) {
    for (const evt of events) {
      const comp      = (evt.competitions||[])[0]||{};
      const state     = (comp.status||{}).type?.state;
      if (state !== 'in') continue; // only live matches

      const teams     = comp.competitors||[];
      const home      = teams.find(t=>t.homeAway==='home')||teams[0]||{};
      const away      = teams.find(t=>t.homeAway==='away')||teams[1]||{};
      const scoreStr  = `${home.score||0}-${away.score||0}`;
      const matchId   = comp.id || evt.id;

      if (!matchId) continue;

      if (goalTracker[matchId] && goalTracker[matchId] !== scoreStr) {
        // Score changed — GOL!
        navigator.vibrate([200, 100, 200, 100, 400]); // patrón gol
        const homeName = (home.team||{}).shortDisplayName||'Local';
        const awayName = (away.team||{}).shortDisplayName||'Visit.';
        showToast('⚽ GOL — ' + homeName + ' ' + scoreStr + ' ' + awayName, 5000);
      }
      goalTracker[matchId] = scoreStr;
    }
  }
}

// Auto-refresh live matches every 45 seconds
let liveRefreshInterval = null;

function startLiveRefresh() {
  if (liveRefreshInterval) return;
  liveRefreshInterval = setInterval(async () => {
    // Only refresh if there are live matches
    const hasLive = document.querySelector('.match-card.live');
    if (!hasLive) return;
    const results = await Promise.allSettled(
      ESPN_LEAGUES.map(lg =>

async function fetchMatches() {
  const container = document.getElementById('matches-container');
  container.innerHTML = '<div class="loading-matches"><div class="spinner"></div><p>Cargando partidos...</p></div>';

  const results = await Promise.allSettled(
    ESPN_LEAGUES.map(lg =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${lg.slug}/scoreboard`)
        .then(r => r.ok ? r.json() : null)
        .then(d => ({ lg, events: d ? (d.events || []) : [] }))
        .catch(() => ({ lg, events: [] }))
    )
  );

  const todayCL = todayChile();
  const grouped = [];

  for (const res of results) {
    if (res.status !== 'fulfilled') continue;
    const { lg, events } = res.value;
    const todayEvents = events.filter(evt => {
      const comp = (evt.competitions || [])[0] || {};
      if (!comp.date) return false;
      return new Intl.DateTimeFormat('en-CA', { timeZone:'America/Santiago' }).format(new Date(comp.date)) === todayCL;
    });
    if (todayEvents.length) grouped.push({ lg, events: todayEvents });
  }

  allMatches = grouped;
  checkGoalVibration(grouped);
  document.getElementById('league-filter-bar').style.display = 'none';

  if (!grouped.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚽</div><p>Sin partidos hoy en las ligas configuradas</p></div>';
    return;
  }

  let html = '';
  for (const { lg, events } of grouped) {
    html += `<div class="league-group-header">${lg.flag} ${lg.name}</div>`;
    for (const evt of events) html += buildMatchCard(evt);
  }
  container.innerHTML = html;
}

function buildMatchCard(evt) {
  const comp      = (evt.competitions || [])[0] || {};
  const teams     = comp.competitors || [];
  const home      = teams.find(t => t.homeAway === 'home') || teams[0] || {};
  const away      = teams.find(t => t.homeAway === 'away') || teams[1] || {};
  const homeName  = (home.team || {}).shortDisplayName || '?';
  const awayName  = (away.team || {}).shortDisplayName || '?';
  const homeLogo  = (home.team || {}).logo || '';
  const awayLogo  = (away.team || {}).logo || '';
  const homeScore = home.score ?? '';
  const awayScore = away.score ?? '';
  const stateType = (comp.status || {}).type || {};
  const state     = stateType.state || 'pre';
  const detail    = stateType.shortDetail || '';
  const isLive    = state === 'in';
  const isDone    = state === 'post';
  const isPre     = state === 'pre';
  const timeStr   = isPre && comp.date ? (chileTime(comp.date) || detail) : detail;
  const matchId   = comp.id || evt.id || '';

  const scoreOrTime = (isLive || isDone)
    ? `<div class="mc-score">${homeScore}<span class="mc-dash">-</span>${awayScore}</div>`
    : `<div class="mc-time">${timeStr}</div>`;

  const statusLine = isLive
    ? `<span class="live-badge">● ${detail}</span>`
    : isDone ? `<span class="mc-done">FIN</span>`
    : `<span class="mc-pre">🕐 ${timeStr}</span>`;

  const isSet = reminderSet.has(matchId);
  const reminderBtn = isPre && matchId ? `
    <button class="btn-reminder${isSet?' set':''}" id="rbtn-${matchId}"
      data-match-id="${matchId}" data-home="${homeName}" data-away="${awayName}" data-time="${timeStr}"
      onclick="setReminderFromBtn(this)">
      ${isSet ? '✓' : 'R'}
    </button>` : '';

  return `
  <div class="match-card${isLive?' live':''}${isDone?' finished':''}" onclick="openMatchStats('${matchId}','${comp.id || ''}','${evt.id || ''}')">
    <div class="mc-row">
      <div class="mc-team">
        ${homeLogo?`<img class="mc-logo" src="${homeLogo}" onerror="this.style.display='none'">`:''}
        <span class="mc-name">${homeName}</span>
      </div>
      <div class="mc-center">
        ${scoreOrTime}
        <div class="mc-status-line">${statusLine}</div>
      </div>
      <div class="mc-team mc-team-away">
        <span class="mc-name">${awayName}</span>
        ${awayLogo?`<img class="mc-logo" src="${awayLogo}" onerror="this.style.display='none'">`:''}
      </div>
    </div>
    ${reminderBtn ? `<div class="mc-footer">${reminderBtn}</div>` : ''}
  </div>`;
}

async function openMatchStats(matchId, compId, evtId) {
  if (!compId && !evtId) return;
  const id = compId || evtId;

  // Show modal immediately
  let modal = document.getElementById('match-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'match-modal';
    modal.className = 'match-modal';
    modal.innerHTML = '<div class="match-modal-content" id="match-modal-body"></div>';
    modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
    document.body.appendChild(modal);
  }
  modal.style.display = 'flex';
  document.getElementById('match-modal-body').innerHTML = '<div class="loading-matches"><div class="spinner"></div><p>Cargando estadísticas...</p></div>';

  // Find the event data we already have
  let evt = null;
  for (const { events } of allMatches) {
    evt = events.find(e => {
      const c = (e.competitions||[])[0]||{};
      return c.id === compId || e.id === evtId;
    });
    if (evt) break;
  }

  // Try to fetch detailed stats from ESPN
  try {
    // Find which league this match belongs to
    let leagueSlug = '';
    for (const { lg, events } of allMatches) {
      if (events.find(e => { const c=(e.competitions||[])[0]||{}; return c.id===compId||e.id===evtId; })) {
        leagueSlug = lg.slug; break;
      }
    }

    const url = leagueSlug
      ? `https://site.api.espn.com/apis/site/v2/sports/soccer/${leagueSlug}/summary?event=${evtId||compId}`
      : null;

    let details = null;
    if (url) {
      const r = await fetch(url);
      if (r.ok) details = await r.json();
    }

    renderMatchModal(evt, details);
  } catch(e) {
    renderMatchModal(evt, null);
  }
}
window.openMatchStats = openMatchStats;

function renderMatchModal(evt, details) {
  const body = document.getElementById('match-modal-body');
  if (!body) return;

  const comp   = evt ? (evt.competitions||[])[0]||{} : {};
  const teams  = comp.competitors||[];
  const home   = teams.find(t=>t.homeAway==='home')||teams[0]||{};
  const away   = teams.find(t=>t.homeAway==='away')||teams[1]||{};
  const homeName = (home.team||{}).displayName||'Local';
  const awayName = (away.team||{}).displayName||'Visitante';
  const stateType= (comp.status||{}).type||{};
  const state    = stateType.state||'pre';
  const isLive   = state==='in';
  const isDone   = state==='post';

  // Scoring plays (goals)
  const plays = details?.scoringPlays || [];
  // Stats
  const statsArr = details?.competitions?.[0]?.competitors || comp.competitors || [];
  // Situation (cards etc)
  const situation = details?.situation || {};

  // ESPN puts goal details in competitions[0].details (not scoringPlays)
  const details0 = details?.competitions?.[0] || {};
  const allDetails = details0.details || [];
  const goalDetails = allDetails.filter(d => {
    const txt = (d.type?.text || d.type?.id || '').toLowerCase();
    return txt.includes('goal') || txt === 'goal' || txt.includes('score');
  });
  // Fallback to scoringPlays if details empty
  const usePlays = goalDetails.length ? goalDetails : plays;

  let goalsHTML = '';
  if (usePlays.length) {
    goalsHTML = '<div class="ms-section-title">Goles</div><div class="ms-goals">';
    for (const p of usePlays) {
      const min    = p.clock?.displayValue || p.clock?.value || '';
      const team   = (p.team||{}).shortDisplayName || (p.team||{}).abbreviation || '';
      // ESPN details: athletesInvolved[0] is scorer, [1] is assister
      const scorer = (p.athletesInvolved||[])[0]?.displayName
                  || (p.scoringPlay?.athletesInvolved||[])[0]?.displayName
                  || p.text || '';
      const assist = (p.athletesInvolved||[])[1]?.displayName || '';
      const typeText = (p.type?.text || p.type?.id || p.text || '').toLowerCase();
      const isPen  = typeText.includes('penalty') || typeText.includes('pen');
      const isOG   = typeText.includes('own') || typeText.includes('og');
      goalsHTML += `<div class="ms-goal-row">
        <span class="ms-goal-min">${min ? min+"'" : ''}</span>
        <span class="ms-goal-dot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${isPen?'var(--accent2)':isOG?'var(--red)':'var(--green)'}"></span>
        <span class="ms-goal-info">
          <b>${scorer||'Gol'}</b>${team?`<span class="ms-goal-team">${team}</span>`:''}
          ${isPen?'<span class="ms-pen">P</span>':''}${isOG?'<span class="ms-og">PP</span>':''}
          ${assist?`<span class="ms-assist">Asist: ${assist}</span>`:''}
        </span>
      </div>`;
    }
    goalsHTML += '</div>';
  }

  // Build stats table
  let statsHTML = '';
  if (statsArr.length >= 2) {
    const h = statsArr.find(t=>t.homeAway==='home')||statsArr[0];
    const a = statsArr.find(t=>t.homeAway==='away')||statsArr[1];
    const hStats = {};
    const aStats = {};
    for (const s of h.statistics||[]) hStats[s.name] = s.displayValue;
    for (const s of a.statistics||[]) aStats[s.name] = s.displayValue;

    const STAT_LABELS = [
      ['shotsOnTarget','Tiros al arco'],
      ['shots','Tiros totales'],
      ['possessionPct','Posesión'],
      ['fouls','Faltas'],
      ['yellowCards','Tarjetas amarillas'],
      ['redCards','Tarjetas rojas'],
      ['offsides','Fueras de juego'],
      ['cornerKicks','Córners'],
      ['saves','Atajadas'],
      ['passAccuracy','Precisión pases'],
    ];

    const rows = STAT_LABELS
      .filter(([k]) => hStats[k] !== undefined || aStats[k] !== undefined)
      .map(([k, label]) => {
        const hv = hStats[k] || '0';
        const av = aStats[k] || '0';
        return `<div class="ms-stat-row">
          <span class="ms-stat-val home">${hv}</span>
          <span class="ms-stat-label">${label}</span>
          <span class="ms-stat-val away">${av}</span>
        </div>`;
      }).join('');

    if (rows) statsHTML = `<div class="ms-section-title">📊 Estadísticas</div><div class="ms-stats">${rows}</div>`;
  }

  // Cards
  let cardsHTML = '';
  const bookings = details?.competitions?.[0]?.situation?.lastPlay || [];
  const incidents = details?.header?.competitions?.[0]?.details || [];
  const cards = incidents.filter(i => i.type?.text?.includes('Card') || i.type?.text?.includes('card'));
  if (cards.length) {
    cardsHTML = '<div class="ms-section-title">🟨 Tarjetas</div><div class="ms-goals">';
    for (const c of cards) {
      const min  = c.clock?.displayValue || '';
      const player = (c.athletesInvolved||[])[0]?.displayName || '';
      const team = (c.team||{}).shortDisplayName || '';
      const isRed = (c.type?.text||'').toLowerCase().includes('red');
      cardsHTML += `<div class="ms-goal-row">
        <span class="ms-goal-min">${min}'</span>
        <span class="ms-goal-icon">${isRed?'🟥':'🟨'}</span>
        <span class="ms-goal-info"><b>${player}</b><span class="ms-goal-team">${team}</span></span>
      </div>`;
    }
    cardsHTML += '</div>';
  }

  const scoreDisplay = (isLive||isDone)
    ? `<div class="ms-score">${home.score||0} - ${away.score||0}</div>`
    : `<div class="ms-upcoming">Próximo</div>`;

  body.innerHTML = `
    <div class="ms-header">
      <button class="ms-close" onclick="document.getElementById('match-modal').style.display='none'">✕</button>
      <div class="ms-teams-row">
        <div class="ms-team-big">
          ${(home.team||{}).logo ? `<img src="${(home.team||{}).logo}" class="ms-team-logo">` : ''}
          <span>${homeName}</span>
        </div>
        <div class="ms-center-block">
          ${scoreDisplay}
          <div class="ms-status-text">${stateType.shortDetail||''}</div>
        </div>
        <div class="ms-team-big right">
          ${(away.team||{}).logo ? `<img src="${(away.team||{}).logo}" class="ms-team-logo">` : ''}
          <span>${awayName}</span>
        </div>
      </div>
    </div>
    <div class="ms-body">
      ${goalsHTML || (!isDone && !isLive ? '<p class="ms-empty">El partido aún no ha comenzado</p>' : (!goalsHTML ? '<p class="ms-empty">Sin goles registrados</p>' : ''))}
      ${cardsHTML}
      ${statsHTML || '<p class="ms-empty" style="margin-top:8px">Estadísticas no disponibles aún</p>'}
    </div>`;
}

function setReminderFromBtn(btn) {
  const { matchId, home, away, time } = btn.dataset;
  if (reminderSet.has(matchId)) { showToast('Recordatorio ya activado'); return; }
  if (!time || time === '—') { showToast('Hora no disponible'); return; }
  const [h, m] = time.split(':').map(Number);
  const nowCL  = new Date(new Date().toLocaleString('en-US', { timeZone:'America/Santiago' }));
  const match  = new Date(nowCL);
  match.setHours(h, m - 5, 0, 0);
  const delay  = match.getTime() - nowCL.getTime();
  if (delay <= 0) { showToast('El partido ya comenzó'); return; }
  reminderSet.add(matchId);
  btn.classList.add('set'); btn.textContent = '✓';
  if ('Notification' in window) {
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        setTimeout(() => new Notification('⚽ FlojerApp', { body: `${home} vs ${away} en 5 min · ${time}` }), delay);
      } else {
        setTimeout(() => alert(`FlojerApp: ${home} vs ${away} empieza en 5 min!`), delay);
      }
    });
  } else {
    setTimeout(() => alert(`FlojerApp: ${home} vs ${away} empieza en 5 min!`), delay);
  }
  showToast(`Recordatorio a las ${time} (Chile)`);
}
window.setReminderFromBtn = setReminderFromBtn;

  if (eid) {
    const i = channels.findIndex(c => c.id === eid);
    if (i > -1) channels[i] = { id:eid, name, url, logo: logo||name.slice(0,6).toUpperCase() };
    showToast('Canal actualizado'); cancelEdit();
  } else {
    channels.push({ id: Date.now().toString(), name, url, logo: logo||name.slice(0,6).toUpperCase() });
    ['ch-name','ch-url','ch-logo'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    showToast('Canal guardado');
  }
  persistChannels(); renderChannelsList(); renderSettingsChannels();
}
window.saveChannel = saveChannel;

function cancelEdit() {
  document.getElementById('ch-edit-id').value = '';
  ['ch-name','ch-url','ch-logo'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const ce = document.getElementById('btn-cancel-edit'); if(ce) ce.style.display='none';

  const ft = document.getElementById('form-title'); if(ft) ft.textContent='➕ Agregar Canal';
}

function editChannel(id) {

  document.getElementById('ch-edit-id').value = ch.id;
  document.getElementById('ch-name').value    = ch.name;
  document.getElementById('ch-url').value     = ch.url;
  document.getElementById('ch-logo').value    = ch.logo || '';
  const ce = document.getElementById('btn-cancel-edit'); if(ce) ce.style.display='inline-block';
  const sb = document.getElementById('btn-save-channel'); if(sb) sb.textContent='💾 Actualizar';

window.editChannel = editChannel;

function copyChannelUrl(id) {
  const ch = channels.find(c => c.id === id); if (!ch) return;
  navigator.clipboard?.writeText(ch.url).then(() => showToast('URL copiada')).catch(() => showToast('No se pudo copiar'));
}
window.copyChannelUrl = copyChannelUrl;

function deleteChannel(id) {
  if (!confirm('¿Eliminar canal?')) return;
  channels = channels.filter(c => c.id !== id);
  persistChannels(); renderChannelsList(); renderSettingsChannels();
  showToast('Canal eliminado');
}
window.deleteChannel = deleteChannel;

function filterChannels(q) { renderChannelsList(q.toLowerCase()); }

function renderChannelsList(filter = '') {
  const list  = document.getElementById('channels-list');
  const empty = document.getElementById('no-channels');
  if (!list) return;
  const show = filter ? channels.filter(c => c.name.toLowerCase().includes(filter)) : channels;

function renderSettingsChannels() {
  const list = document.getElementById('settings-channels-list');
  const hint = document.getElementById('no-saved-channels');
  if (!list) return;
  if (!channels.length) { list.innerHTML=''; if(hint) hint.style.display='block'; return; }
  if(hint) hint.style.display='none';
  list.innerHTML = channels.map(ch => `
    <div class="settings-ch-item">
      <div class="settings-ch-name" title="${ch.url}">${ch.name}</div>
      <button class="icon-btn" onclick="editChannel('${ch.id}')">✏️</button>
      <button class="icon-btn" onclick="copyChannelUrl('${ch.id}')">📋</button>
      <button class="icon-btn" onclick="deleteChannel('${ch.id}')"></button>

function playChannel(id) {
  const ch = channels.find(c => c.id === id); if (!ch) return;
  switchTab('iptv'); switchIPTV('player');
  const video = document.getElementById('iptv-video');
  const ph    = document.getElementById('player-placeholder');
  const np    = document.getElementById('now-playing');
  const err   = document.getElementById('player-error');
  if(ph) ph.style.display='none'; if(err) err.style.display='none';
  if(np) np.style.display='flex';
  const logo = document.getElementById('np-logo'); if(logo) logo.textContent = ch.logo||ch.name.slice(0,6);
  const name = document.getElementById('np-name'); if(name) name.textContent = ch.name;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance=null; }
  video.src='';
  const start = () => {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker:false, lowLatencyMode:true });
      hlsInstance.loadSource(ch.url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hlsInstance.on(Hls.Events.ERROR, (_, d) => { if(d.fatal && err) err.style.display='block'; });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src=ch.url; video.play().catch(()=>{});
    } else { if(err) err.style.display='block'; }
  };
  window.Hls ? start() : setTimeout(start, 800);
}
window.playChannel = playChannel;

function stopIPTV() {
  const video = document.getElementById('iptv-video');
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance=null; }
  video.pause(); video.src='';
  const ph = document.getElementById('player-placeholder'); if(ph) ph.style.display='flex';
  const np = document.getElementById('now-playing');        if(np) np.style.display='none';
  const err= document.getElementById('player-error');       if(err) err.style.display='none';
}
window.stopIPTV = stopIPTV;

// Cloud sync via JSONBin.io
function getBinId(u) { return JSON.parse(localStorage.getItem('mp_bins')||'{}')[u]||null; }
function saveBinId(u, id) {
  const b=JSON.parse(localStorage.getItem('mp_bins')||'{}'); b[u]=id;
  localStorage.setItem('mp_bins', JSON.stringify(b));
}

async function cloudPushData(username, data) {
  const binId   = getBinId(username);
  const headers = { 'Content-Type':'application/json', 'X-Bin-Versioning':'false' };
  try {
    if (binId) {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { method:'PUT', headers, body:JSON.stringify({ record:data }) });
      console.log('[FlojerApp] cloudPush update:', r.status);
    } else {
      const r = await fetch('https://api.jsonbin.io/v3/b', { method:'POST', headers:{ ...headers,'X-Bin-Name':'hdt-'+username }, body:JSON.stringify({ record:data }) });
      console.log('[FlojerApp] cloudPush create:', r.status);
      if (r.ok) {
        const j = await r.json();
        saveBinId(username, j.metadata.id);
        console.log('[FlojerApp] BIN_ID created:', j.metadata.id);
      } else {
        const err = await r.text();
        console.log('[FlojerApp] cloudPush error:', err);
      }
    }
  } catch(e) {
    console.log('[FlojerApp] cloudPush exception:', e.message);
  }
}

async function cloudPush(username) {
  if (!uniState.users[username]) return;
  const data    = uniState.users[username];
  const binId   = getBinId(username);
  const headers = { 'Content-Type':'application/json', 'X-Bin-Versioning':'false' };
  try {
    if (binId) {
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { method:'PUT', headers, body:JSON.stringify({ record:data }) });
    } else {
      const r = await fetch('https://api.jsonbin.io/v3/b', { method:'POST', headers:{ ...headers,'X-Bin-Name':'hdt-'+username }, body:JSON.stringify({ record:data }) });
      if (r.ok) { const j=await r.json(); saveBinId(username, j.metadata.id); }
    }
  } catch(e) {}
}

async function cloudPull(username) {
  const binId = getBinId(username);
  if (!binId) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`);
    if (!r.ok) return null;
    const j = await r.json();
    return j.record || null;
  } catch { return null; }
}

function loadUniData() {
  try {
    const s = JSON.parse(localStorage.getItem('mp_uni')||'{}');
    uniState.users       = s.users       || {};
    uniState.currentUser = s.currentUser || null;
  } catch { uniState = { currentUser:null, users:{} }; }

  // Ensure admin user object exists
  if (!uniState.users[ADMIN_USER]) {
    uniState.users[ADMIN_USER] = { ramos:[], fin:{} };
  }
  const adminUser = uniState.users[ADMIN_USER];
  if (!adminUser.ramos) adminUser.ramos = [];

  // Only inject default ramos if admin has NEVER had any ramos at all
  // (i.e. this is a fresh install). If they deleted ramos intentionally, don't re-add.
  const hasAnyHistory = adminUser.ramos.length > 0 ||
    localStorage.getItem('mp_admin_ramos_initialized') === '1';

  if (!hasAnyHistory) {
    for (const def of ADMIN_RAMOS) {
      adminUser.ramos.push({ ...def, sesiones:[], notas:[] });
    }
    localStorage.setItem('mp_admin_ramos_initialized', '1');
  }
  // Mark as initialized if they already have ramos (migrate existing users)
  if (adminUser.ramos.length > 0) {
    localStorage.setItem('mp_admin_ramos_initialized', '1');
  }
  saveUniDataLocal();
  // Restore fin tab visibility based on saved session
  // (runs after DOM is ready via DOMContentLoaded)
  if (typeof updateFinTabVisibility === 'function') updateFinTabVisibility();
}

function saveUniDataLocal() {
  localStorage.setItem('mp_uni', JSON.stringify({ users:uniState.users, currentUser:uniState.currentUser }));
}

async function pushWidgetData() {
  const user = uniState.currentUser;
  if (!user || !uniState.users[user]) return;
  const ramos = (uniState.users[user].ramos || []).map(r => ({
    nombre:  r.nombre,
    codigo:  r.codigo || '',
    horario: (r.horario || []).map(b => ({ dia:b.dia, inicio:b.inicio, fin:b.fin, sala:b.sala||'' })),
  }));
  const payload = { ramos, updatedAt: new Date().toISOString() };
  const key   = 'mp_widget_bin_' + user;
  const binId = localStorage.getItem(key);
  const hdrs  = { 'Content-Type':'application/json', 'X-Bin-Versioning':'false' };
  try {
    if (binId) {
      await fetch('https://api.jsonbin.io/v3/b/' + binId, { method:'PUT', headers:hdrs, body:JSON.stringify({record:payload}) });
    } else {
      const res = await fetch('https://api.jsonbin.io/v3/b', { method:'POST', headers:{...hdrs,'X-Bin-Name':'flojer-widget-'+user}, body:JSON.stringify({record:payload}) });
      if (res.ok) { const j=await res.json(); localStorage.setItem(key, j.metadata.id); }
    }
  } catch(e) {}
}

function showWidgetBinId() {
  const user  = uniState.currentUser;
  const binId = localStorage.getItem('mp_widget_bin_' + user);
  if (!binId) { showToast('Guarda un ramo primero para generar el ID'); pushWidgetData(); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(binId).then(() => showToast('ID copiado: ' + binId.slice(0,12) + '...'));
  } else {
    prompt('Copia este ID para el widget:', binId);
  }
}
window.showWidgetBinId = showWidgetBinId;

// ── Widget data sync ──────────────────────────────────────────────────────────
const WIDGET_BIN_KEY = 'flojer_widget_bin';

async function pushWidgetData(userData) {
  const ramos = (userData.ramos || []).map(r => ({
    nombre:  r.nombre,
    codigo:  r.codigo || '',
    horario: r.horario || [],
  }));
  const payload = JSON.stringify({ record: { ramos, updated: Date.now() } });
  const headers = { 'Content-Type': 'application/json', 'X-Bin-Versioning': 'false' };
  try {
    const existingId = localStorage.getItem(WIDGET_BIN_KEY);
    if (existingId) {
      await fetch(`https://api.jsonbin.io/v3/b/${existingId}`, { method: 'PUT', headers, body: payload });
    } else {
      const r = await fetch('https://api.jsonbin.io/v3/b', {
        method: 'POST',
        headers: { ...headers, 'X-Bin-Name': 'flojer-widget' },
        body: payload
      });
      if (r.ok) {
        const j = await r.json();
        localStorage.setItem(WIDGET_BIN_KEY, j.metadata.id);
        console.log('[FlojerApp] Widget Bin ID:', j.metadata.id);
      }
    }
  } catch(e) {}
}

function getWidgetBinId() {
  return localStorage.getItem(WIDGET_BIN_KEY) || null;
}

function saveUniData() {
  saveUniDataLocal();
  if (uniState.currentUser) {
    setTimeout(() => {
      const user = uniState.currentUser;
      if (!uniState.users[user]) return;
      const data = JSON.parse(JSON.stringify(uniState.users[user]));
      if (data.fin) delete data.fin._selectedMes;
      cloudPushData(user, data);
      // Also push lightweight widget data (ramos only, no sesiones/notas)
      pushWidgetData(user);
    }, 200);
  }
}

function pushWidgetData(user) {
  const userData = uniState.users[user];
  if (!userData) return;
  // Lightweight: only what the widget needs
  const widgetPayload = {
    ramos: (userData.ramos || []).map(r => ({
      id:      r.id,
      nombre:  r.nombre,
      codigo:  r.codigo,
      horario: r.horario || []
    })),
    updatedAt: new Date().toISOString()
  };
  // Store widget bin ID separately
  const widgetBinId = localStorage.getItem('flojer_widget_bin');
  const headers = { 'Content-Type': 'application/json', 'X-Bin-Versioning': 'false' };
  if (widgetBinId) {
    fetch(`https://api.jsonbin.io/v3/b/${widgetBinId}`, {
      method: 'PUT', headers, body: JSON.stringify({ record: widgetPayload })
    }).catch(() => {});
  } else {
    fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { ...headers, 'X-Bin-Name': 'flojer-widget-' + user },
      body: JSON.stringify({ record: widgetPayload })
    }).then(r => r.ok ? r.json() : null)
      .then(j => {
        if (j && j.metadata && j.metadata.id) {
          localStorage.setItem('flojer_widget_bin', j.metadata.id);
          localStorage.setItem('flojer_widget_bin_url',
            'https://api.jsonbin.io/v3/b/' + j.metadata.id + '/latest');
          showWidgetBinUrl(j.metadata.id);
        }
      }).catch(() => {});
  }
}

function showWidgetBinUrl(binId) {
  const url = 'https://api.jsonbin.io/v3/b/' + binId + '/latest';
  console.log('[FlojerApp] Widget data URL:', url);
  // Toast with copy option shown once
  if (localStorage.getItem('flojer_widget_url_shown')) return;
  localStorage.setItem('flojer_widget_url_shown', '1');
  localStorage.setItem('flojer_widget_bin_url', url);
}

function getWidgetBinUrl() {
  return localStorage.getItem('flojer_widget_bin_url') || null;
}
window.getWidgetBinUrl = getWidgetBinUrl;

function copyWidgetUrl() {
  const url = getWidgetBinUrl();
  if (!url) { showToast('Agrega un ramo primero para generar la URL'); return; }
  navigator.clipboard.writeText(url)
    .then(() => showToast('URL copiada — pégala en FlojerWidget.js'))

}
window.copyWidgetUrl = copyWidgetUrl;

function createUniUser() {
  try {
    const raw  = (document.getElementById('uni-new-username')?.value || '').trim();
    const name = raw.toLowerCase().replace(/\s+/g, '_');
    if (!name) { showToast('Escribe un nombre'); return; }

async function selectUniUser(name) {
  uniState.currentUser = name;
  saveUniDataLocal();
  updateFinTabVisibility();
  renderUniView();
  const cloud = await cloudPull(name);
  if (cloud) {
    // Merge: cloud wins for ramos/notas/sesiones, preserve any local-only data
    const local = uniState.users[name] || {};
    uniState.users[name] = { ...local, ...cloud };
    // For admin: re-inject any missing default ramos
    if (name === ADMIN_USER) {
      for (const def of ADMIN_RAMOS) {
        if (!uniState.users[name].ramos.find(r => r.id === def.id)) {
          uniState.users[name].ramos.push({ ...def, sesiones:[], notas:[] });
        }
      }
    }
    saveUniDataLocal();
    renderUniView();
    showToast(' Sincronizado');
  }
}
window.selectUniUser = selectUniUser;

function logoutUni() {
  // If on fin tab, switch away first
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab && activeTab.dataset.tab === 'fin') {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'football'));
    document.querySelectorAll('.tab-content').forEach(s => s.classList.toggle('hidden', s.id !== 'tab-football'));

  saveUniDataLocal();
  updateFinTabVisibility();

}
window.logoutUni = logoutUni;

async function syncUserData() {
  if (!uniState.currentUser) return;
  showToast('⏳ Sincronizando...');
  const cloud = await cloudPull(uniState.currentUser);
  if (cloud) {
    uniState.users[uniState.currentUser] = { ...uniState.users[uniState.currentUser], ...cloud };

    renderUniView();

function renderUniDashboard(container) {

  // Today's classes
  const clasesHoy = [];
  for (const r of ramos) {
    for (const b of (r.horario||[])) {
      if (b.dia === diaHoy) clasesHoy.push({ ramo:r, bloque:b });
    }
  }
  clasesHoy.sort((a,b) => a.bloque.inicio.localeCompare(b.bloque.inicio));

  // "Can I skip?" — ramos where skips remain
  const puedoFaltar = ramos.filter(r => {
    const s = calcRamoStats(r);
    return s.faltasRestantes > 0;
  });

  container.innerHTML = `
    <div class="uni-header">
      <div class="uni-user-info">
        <div class="uni-user-avatar sm">${user.slice(0,2).toUpperCase()}</div>

      </div>
    </div>

    <!-- HOY -->
    <div class="uni-today-card">
      <div class="uni-today-title"> Hoy — ${diaHoy}</div>
      ${clasesHoy.length ? clasesHoy.map(({ ramo:r, bloque:b }) => {
        const s = calcRamoStats(r);
        const fechaKey = todayChile() + '|' + b.inicio;
        const sesionHoy = (r.sesiones||[]).find(s => s.fecha === todayChile() && s.bloque === b.inicio);
        const marcado = sesionHoy ? sesionHoy.estado : null;
        return `<div class="uni-today-ramo">
          <div class="uni-today-info">
            <div class="uni-ramo-dot" style="background:'#3f3f46'"></div>
            <div>
              <div class="uni-today-name">${r.nombre}</div>
              <div class="uni-today-hora">${b.inicio}–${b.fin}${b.sala?' · '+b.sala:''} · Faltas restantes: ${s.faltasRestantes}</div>
            </div>
          </div>
          <div class="uni-today-actions">
            <button class="uni-asist-btn presente${marcado==='presente'?' active-estado':''}" onclick="marcarHoy('${r.id}','${b.inicio}','presente')">✓</button>
            <button class="uni-asist-btn ausente${marcado==='ausente'?' active-estado':''}" onclick="marcarHoy('${r.id}','${b.inicio}','ausente')">✗</button>
            <button class="uni-asist-btn justificado${marcado==='justificado'?' active-estado':''}" onclick="marcarHoy('${r.id}','${b.inicio}','justificado')">J</button>

function marcarHoy(ramoId, bloque, estado) {

function renderRamoCard(r) {
  const s = calcRamoStats(r);
  const pct = Math.min(100, Math.round((s.presentes / Math.max(s.totalClases, 1)) * 100));
  const cls = s.faltasRestantes <= 0 ? 'danger' : s.faltasRestantes <= 2 ? 'warn' : 'ok';
  return `
  <div class="uni-ramo-card" onclick="openRamo('${r.id}')">
    <div class="uni-ramo-color" style="background:#3f3f46"></div>
    <div class="uni-ramo-info">
      <div class="uni-ramo-codigo">${r.codigo||''}</div>
      <div class="uni-ramo-nombre">${r.nombre}</div>
      <div class="uni-ramo-stats">
        <span class="uni-stat-pill ${cls}">${s.faltasRestantes > 0 ? `${s.ausentes} faltas · ${s.faltasRestantes} restantes` : `Sin faltas disponibles`}</span>
        <span class="uni-pct">${pct}% asistencia</span>
      </div>
      <div class="uni-ramo-bar-wrap"><div class="uni-ramo-bar ${cls}" style="width:${pct}%"></div></div>
    </div>
    <div style="padding:0 12px;color:var(--muted)">›</div>
  </div>`;
}

function calcRamoStats(r) {
  const sesiones      = r.sesiones || [];
  const presentes     = sesiones.filter(s => s.estado === 'presente').length;
  const ausentes      = sesiones.filter(s => s.estado === 'ausente').length;
  const justificados  = sesiones.filter(s => s.estado === 'justificado').length;
  const totalRegistradas = presentes + ausentes + justificados;

  // Count total possible classes from semStart to today
  const totalClases   = countTotalClases(r);
  const maxAus        = Math.floor(totalClases * ((r.maxAusencia||25) / 100));
  const faltasRestantes = Math.max(0, maxAus - ausentes);

  return { presentes, ausentes, justificados, totalRegistradas, totalClases, maxAus, faltasRestantes };
}

function countTotalClases(r) {
  const horario  = r.horario || [];
  const start    = new Date((r.semStart || '2026-03-10') + 'T00:00:00');
  const nowCL    = new Date(new Date().toLocaleString('en-US', { timeZone:'America/Santiago' }));
  let count = 0;
  for (const b of horario) {
    const dayIdx = DIAS_ES.indexOf(b.dia) - 1; // Mon=0
    if (dayIdx < 0) continue;
    const jsDay = DIAS_ES.indexOf(b.dia); // 1=Mon..5=Fri in DIAS_ES
    const first = new Date(start);
    let diff = jsDay - first.getDay();
    if (diff < 0) diff += 7;
    first.setDate(first.getDate() + diff);
    const d = new Date(first);
    while (d <= nowCL) { count++; d.setDate(d.getDate() + 7); }
  }
  return count;
}

function renderScheduleGrid(ramos) {
  const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };

  const slotsByDay = {};
  DIAS.forEach(d => slotsByDay[d] = []);
  for (const r of ramos) {
    for (const b of (r.horario||[])) {
      if (slotsByDay[b.dia]) slotsByDay[b.dia].push({ r, b });
    }
  }

  let minTime = 24*60, maxTime = 0;
  for (const slots of Object.values(slotsByDay)) {
    for (const {b} of slots) {
      minTime = Math.min(minTime, toMin(b.inicio));
      maxTime = Math.max(maxTime, toMin(b.fin));
    }
  }
  if (minTime > maxTime) return '<p style="padding:0 16px;color:var(--muted);font-size:13px">Sin ramos configurados</p>';

  minTime = Math.floor(minTime / 60) * 60;
  maxTime = Math.ceil(maxTime  / 60) * 60;
  const totalMin   = maxTime - minTime;
  const PX_PER_MIN = 1.55;
  const gridH      = totalMin * PX_PER_MIN;

  return `<div class="uni-schedule" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <div style="display:flex;gap:0;min-width:300px">

      <!-- Hour axis -->
      <div style="width:26px;flex-shrink:0;position:relative;height:${gridH}px;margin-top:22px">
        ${Array.from({length:(maxTime-minTime)/60+1},(_,i)=>{
          const t   = minTime + i*60;
          const top = i*60*PX_PER_MIN;
          return `<div style="position:absolute;top:${top}px;right:3px;
            font-size:8px;color:var(--muted);font-family:var(--mono);
            line-height:1;transform:translateY(-50%)">
            ${String(t/60).padStart(2,'0')}
          </div>`;
        }).join('')}
      </div>

      <!-- Day columns -->
      <div style="flex:1;display:flex;gap:1px;min-width:0">
        ${DIAS.map(d => {
          const slots = (slotsByDay[d]||[]).sort((a,b)=>toMin(a.b.inicio)-toMin(b.b.inicio));
          return `<div style="flex:1;min-width:0">
            <!-- Day label -->
            <div style="height:22px;display:flex;align-items:center;justify-content:center;
              font-size:9px;font-weight:600;color:var(--txt2);letter-spacing:1px;
              border-bottom:1px solid var(--border)">
              ${d.slice(0,3).toUpperCase()}
            </div>
            <!-- Time grid -->
            <div style="position:relative;height:${gridH}px;background:var(--card)">
              <!-- Hour lines -->
              ${Array.from({length:(maxTime-minTime)/60+1},(_,i)=>{
                const top = i*60*PX_PER_MIN;
                return `<div style="position:absolute;top:${top}px;left:0;right:0;
                  border-top:1px solid var(--border);opacity:.35;pointer-events:none"></div>`;
              }).join('')}
              <!-- Slots -->
              ${slots.map(({r,b}) => {
                const top  = (toMin(b.inicio) - minTime) * PX_PER_MIN;
                const h    = (toMin(b.fin) - toMin(b.inicio)) * PX_PER_MIN;
                // Nombre corto: primera palabra significativa
                const words = r.nombre.split(' ');
                const skip  = new Set(['introducción','introduccion','intro','a','la','las','los','de','del','en','al']);
                const shortW = words.find(w => !skip.has(w.toLowerCase())) || words[0];
                return `<div style="
                  position:absolute;
                  top:${top}px;left:1px;right:1px;
                  height:${Math.max(h-2,4)}px;
                  background:var(--elevated);
                  border-left:2px solid #3f3f46;
                  padding:3px 4px 2px;
                  overflow:hidden;
                  box-sizing:border-box;
                ">
                  ${h > 20 ? `<div style="font-size:9px;font-weight:600;color:var(--txt);
                    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                    line-height:1.3">${r.nombre}</div>` : ''}
                  ${h > 38 ? `<div style="font-size:8px;color:var(--txt2);margin-top:2px;
                    font-family:var(--mono)">${b.inicio}–${b.fin}</div>` : ''}
                  ${h > 55 && b.sala ? `<div style="font-size:8px;color:var(--muted);
                    margin-top:1px">${b.sala}</div>` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>

    </div>
  </div>`;
}

// ── Generate fecha options for a ramo ─────────────────────
function generateFechaOptions(ramo) {
  const opts  = [];
  const nowCL = new Date(new Date().toLocaleString('en-US', { timeZone:'America/Santiago' }));
  const start = new Date((ramo.semStart || '2026-03-10') + 'T00:00:00');

  for (const b of (ramo.horario||[])) {
    const jsDay = DIAS_ES.indexOf(b.dia); // 0=Dom 1=Lun...
    if (jsDay < 0) continue;
    const first = new Date(start);
    let diff = jsDay - first.getDay();
    if (diff < 0) diff += 7;
    first.setDate(first.getDate() + diff);
    const d = new Date(first);
    while (d <= nowCL) {
      const dateStr = new Intl.DateTimeFormat('en-CA', { timeZone:'America/Santiago' }).format(d);
      const label   = `${b.dia} ${d.toLocaleDateString('es-CL',{day:'numeric',month:'short'})} · ${b.inicio}–${b.fin}${b.sala?' ('+b.sala+')':''}`;
      if (!opts.find(o => o.fecha===dateStr && o.bloque===b.inicio)) {
        opts.push({ fecha:dateStr, bloque:b.inicio, label });
      }
      d.setDate(d.getDate() + 7);
    }
  }
  return opts.sort((a,b) => b.fecha.localeCompare(a.fecha) || b.bloque.localeCompare(a.bloque));
}

function registrarSesionFecha(ramoId, estado) {
  const user  = uniState.currentUser;
  const ramo  = uniState.users[user].ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  const sel   = document.getElementById('fecha-select-' + ramoId);
  if (!sel || !sel.value) { showToast('Selecciona una fecha'); return; }
  const [fecha, bloque] = sel.value.split('|');
  if (!ramo.sesiones) ramo.sesiones = [];
  const existing = ramo.sesiones.findIndex(s => s.fecha===fecha && s.bloque===bloque);
  if (existing >= 0) { ramo.sesiones[existing].estado = estado; }
  else { ramo.sesiones.push({ fecha, bloque, estado }); }
  saveUniData();
  openRamo(ramoId); // re-render modal in place
  showToast({ presente:'Presente registrado', ausente:'Falta registrada', justificado:'Justificado' }[estado]);
}
window.registrarSesionFecha = registrarSesionFecha;

function deleteSesion(ramoId, fecha, bloque) {
  const user = uniState.currentUser;
  const ramo = uniState.users[user].ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  ramo.sesiones = (ramo.sesiones||[]).filter(s => !(s.fecha===fecha && s.bloque===bloque));
  saveUniData();
  openRamo(ramoId);
  showToast('Registro eliminado');
}
window.deleteSesion = deleteSesion;

function renderNotasSection(ramo) {
  const notas = ramo.notas || [];
  if (!notas.length) return '<p style="color:var(--muted);font-size:13px">Sin evaluaciones agregadas</p>';
  const conNota  = notas.filter(n => n.nota !== null && n.nota !== undefined);
  const promActual = conNota.length
    ? conNota.reduce((s, n) => s + (n.nota * n.pct), 0) / conNota.reduce((s, n) => s + n.pct, 0)
    : null;
  const aprobado = promActual !== null && promActual >= 4;
  return `
    ${promActual !== null ? `<div style="font-size:13px;padding:6px 0;color:${aprobado?'#16a34a':'#dc2626'}">
      Promedio actual: <b>${promActual.toFixed(1)}</b> ${aprobado ? '↑' : '↓'}
    </div>` : ''}
    ${notas.slice(0,3).map(n => `
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
        <span>${n.nombre} (${n.pct}%)</span>
        <span style="color:${n.nota>=4?'#16a34a':'#dc2626'}">${n.nota !== null && n.nota !== undefined ? n.nota : '—'}</span>
      </div>`).join('')}
    ${notas.length > 3 ? `<p style="font-size:11px;color:var(--muted)">+${notas.length-3} más</p>` : ''}`;
}

function openNotasRamo(ramoId) {
  const user = uniState.currentUser;
  const ramo = uniState.users[user].ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  const notas  = ramo.notas || [];
  const totalPct = notas.reduce((s, n) => s + n.pct, 0);
  const conNota  = notas.filter(n => n.nota !== null && n.nota !== undefined);
  const notaPonderada = conNota.reduce((s, n) => s + (n.nota * n.pct), 0);
  const pctConNota    = conNota.reduce((s, n) => s + n.pct, 0);
  const promActual    = pctConNota > 0 ? notaPonderada / pctConNota : null;
  const pctRestante   = 100 - totalPct;

  // Calculate nota needed to pass (4.0)
  const notaNecesaria = pctRestante > 0 && conNota.length > 0
    ? (4.0 * 100 - notaPonderada) / pctRestante
    : null;

  document.getElementById('uni-modal-title').textContent = ramo.nombre + ' — Notas';

    <div style="padding:14px 16px">

          ${notaNecesaria !== null ? `<div style="font-size:12px;color:var(--txt2);margin-top:4px">Necesitas <b>${Math.max(1,Math.min(7,notaNecesaria)).toFixed(1)}</b> en el ${pctRestante}% restante para aprobar con 4.0</div>` : ''}
          ${totalPct >= 100 ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">Todas las evaluaciones ingresadas (100%)</div>` : `<div style="font-size:11px;color:var(--muted);margin-top:2px">Evaluaciones ingresadas: ${totalPct}% del total</div>`}
        </div>` : ''}

      <!-- Evaluaciones -->
      <div class="uni-section-label">EVALUACIONES</div>
      ${notas.map((n, i) => `
        <div class="eval-row">
          <div class="eval-info">
            <div class="eval-nombre">${n.nombre}</div>
            <div class="eval-pct">${n.pct}% del ramo</div>
          </div>
          <input type="number" class="eval-nota-input" min="1" max="7" step="0.1"
            placeholder="—" value="${n.nota !== null && n.nota !== undefined ? n.nota : ''}"
            onchange="updateNota('${ramoId}',${i},this.value)"
            style="color:${n.nota>=4?'#16a34a':n.nota?'#dc2626':'var(--txt2)'}">
          <button class="icon-btn" onclick="deleteNota('${ramoId}',${i})" style="width:28px;height:28px;font-size:12px">✕</button>
        </div>`).join('')}

      <!-- Agregar evaluación -->
      <div class="uni-section-label" style="margin-top:14px">AGREGAR EVALUACIÓN</div>
      <div class="add-eval-row">
        <input type="text"   id="nota-nombre" placeholder="Nombre (ej: Prueba 1)" class="form-input" style="flex:2;min-width:120px">
        <input type="number" id="nota-pct"    placeholder="%" class="form-input"   style="flex:1;min-width:60px;max-width:70px" min="1" max="${pctRestante}">
        <input type="number" id="nota-val"    placeholder="Nota" class="form-input" style="flex:1;min-width:70px;max-width:80px" min="1" max="7" step="0.1">
        <button class="uni-add-btn" onclick="addNota('${ramoId}')">+ Agregar</button>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:4px">Porcentaje restante disponible: <b>${pctRestante}%</b></p>
    </div>`;

  document.getElementById('uni-modal').style.display = 'flex';
}
window.openNotasRamo = openNotasRamo;

function updateNota(ramoId, idx, value) {
  const user = uniState.currentUser;
  const ramo = uniState.users[user].ramos.find(r => r.id === ramoId);
  if (!ramo || !ramo.notas[idx]) return;
  const v = parseFloat(value);
  ramo.notas[idx].nota = (!isNaN(v) && v >= 1 && v <= 7) ? Math.round(v * 10) / 10 : null;
  saveUniData();
  // Don't re-render modal to avoid losing focus
}

function addNota(ramoId) {
  const user  = uniState.currentUser;
  const ramo  = uniState.users[user].ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  const nombre = (document.getElementById('nota-nombre')?.value||'').trim();
  const pct    = parseInt(document.getElementById('nota-pct')?.value) || 0;
  const notaRaw= parseFloat(document.getElementById('nota-val')?.value);
  const nota   = (!isNaN(notaRaw) && notaRaw >= 1 && notaRaw <= 7) ? notaRaw : null;
  if (!nombre) { showToast('Escribe el nombre'); return; }
  if (!pct || pct <= 0) { showToast('Porcentaje inválido'); return; }
  const totalActual = (ramo.notas||[]).reduce((s, n) => s + n.pct, 0);
  if (totalActual + pct > 100) { showToast(`Supera 100% (queda ${100-totalActual}%)`); return; }
  if (!ramo.notas) ramo.notas = [];
  ramo.notas.push({ nombre, pct, nota });
  saveUniData();
  openNotasRamo(ramoId);
  showToast('Evaluación agregada');
}
window.addNota = addNota;

function deleteNota(ramoId, idx) {
  const user = uniState.currentUser;
  const ramo = uniState.users[user].ramos.find(r => r.id === ramoId);

  ramo.notas.splice(idx, 1);
  saveUniData();
  openNotasRamo(ramoId);
}

function saveRamo() {
  const nombre   = (document.getElementById('ramo-nombre')?.value||'').trim();
  const codigo   = (document.getElementById('ramo-codigo')?.value||'').trim().toUpperCase();
  const maxAus   = parseInt(document.getElementById('ramo-maxaus')?.value) || 25;
  const semStart = document.getElementById('ramo-semstart')?.value || todayChile();
  const color    = document.getElementById('ramo-color')?.value || '#8b5cf6';
  if (!nombre) { showToast('Escribe el nombre del ramo'); return; }
  const slots    = document.querySelectorAll('.uni-horario-slot');
  const horario  = [];
  slots.forEach(s => {
    const dia    = s.querySelector('.slot-dia')?.value;
    const inicio = s.querySelector('.slot-inicio')?.value;
    const fin    = s.querySelector('.slot-fin')?.value;
    const sala   = (s.querySelector('.slot-sala')?.value||'').trim();
    if (dia && inicio && fin) horario.push({ dia, inicio, fin, sala });
  });
  const user = uniState.currentUser;
  const id   = codigo || ('RAMO_' + Date.now());
  if (uniState.users[user].ramos.find(r => r.id === id)) { showToast('Ya existe un ramo con ese código'); return; }
  uniState.users[user].ramos.push({ id, nombre, codigo, color, maxAusencia:maxAus, semStart, horario, sesiones:[], notas:[] });
  saveUniData();
  closeUniModal();
  renderUniDashboard(document.getElementById('uni-container'));
  showToast('Ramo agregado: ' + nombre);
}
window.saveRamo = saveRamo;

function formatFecha(dateStr) {
  if (!dateStr) return '';
  try { return new Date(dateStr + 'T12:00:00').toLocaleDateString('es-CL', { day:'numeric', month:'short', year:'numeric' }); }
  catch { return dateStr; }
}

function getFinData() {
  const user = uniState.currentUser;
  if (!user || !uniState.users[user]) return null;
  const u = uniState.users[user];
  let needsSave = false;
  if (!u.fin || typeof u.fin !== 'object') { u.fin = {}; needsSave = true; }
  const fin = u.fin;
  if (!fin.categorias || !fin.categorias.length) {
    fin.categorias = DEFAULT_CATS.map(n => ({ nombre:n, icono:CAT_ICONS[n]||'📦', gasto:0 }));
    needsSave = true;
  }
  if (fin.presupuesto === undefined) { fin.presupuesto = 0; needsSave = true; }
  if (!fin.movimientos) { fin.movimientos = []; needsSave = true; }
  if (!fin.objetivos)   { fin.objetivos   = []; needsSave = true; }
  if (!fin.moneda)      { fin.moneda      = 'CLP'; needsSave = true; }
  if (needsSave) saveUniDataLocal(); // persist initialization immediately
  return fin;
}

function saveFinData() { saveUniData(); }

function renderFinView() {
  const c = document.getElementById('fin-container');
  if (!c) return;
  if (!uniState.currentUser) {
    c.innerHTML = `<div class="empty-state" style="padding:40px 20px">
      <div class="empty-icon">💰</div>
      <p>Inicia sesión en la pestaña Uni para usar Finanzas</p>
    </div>`; return;
  }
  const fin = getFinData();
  if (!fin) return;

  const hoy      = todayChile();
  const mes      = hoy.slice(0,7);
  const movMes   = (fin.movimientos||[]).filter(m => m.fecha.startsWith(mes));
  const gastoMes = movMes.filter(m => m.tipo==='gasto').reduce((s,m)=>s+m.monto,0);
  const ingresoMes= movMes.filter(m => m.tipo==='ingreso').reduce((s,m)=>s+m.monto,0);
  const saldo    = fin.presupuesto + ingresoMes - gastoMes;
  const pctUsado = fin.presupuesto > 0 ? Math.min(100, Math.round((gastoMes/(fin.presupuesto+ingresoMes))*100)) : 0;

  // Gasto por categoría este mes
  const gastoCat = {};
  for (const m of movMes.filter(m=>m.tipo==='gasto')) {
    gastoCat[m.categoria] = (gastoCat[m.categoria]||0) + m.monto;
  }

  c.innerHTML = `
    <!-- Saldo hero -->
    <div class="fin-hero">
      <div class="fin-hero-label">Saldo disponible</div>
      <div class="fin-hero-amount">${formatCLP(saldo)}</div>
      <div class="fin-hero-sub">Gastado este mes: ${formatCLP(gastoMes)} de ${formatCLP(fin.presupuesto + ingresoMes)}</div>
      <div class="fin-budget-bar">
        <div class="fin-budget-fill" style="width:${pctUsado}%;background:${pctUsado>90?'#ef4444':pctUsado>70?'#f97316':'#10b981'}"></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="fin-actions">
      <button class="fin-btn-gasto"   onclick="showAddMovimiento('gasto')">− Gasto</button>
      <button class="fin-btn-ingreso" onclick="showAddMovimiento('ingreso')">+ Ingreso</button>
      <button class="fin-btn-config"  onclick="showFinConfig()">⚙️</button>
    </div>

    <!-- Categorías -->
    <div class="fin-section-title">CATEGORÍAS — ${mesNombre(mes)}</div>
    <div class="fin-cats-grid">
      ${(fin.categorias||[]).map(cat => {
        const g   = gastoCat[cat.nombre]||0;
        const max = cat.limite||0;
        const pct = max > 0 ? Math.min(100, Math.round((g/max)*100)) : 0;
        return `<div class="fin-cat-card" onclick="filterMovBycat('${cat.nombre}')">
          <div class="fin-cat-icon">${cat.icono||'📦'}</div>
          <div class="fin-cat-nombre">${cat.nombre}</div>
          <div class="fin-cat-gasto">${formatCLP(g)}</div>
          ${max>0?`<div class="fin-cat-bar"><div style="width:${pct}%;background:${pct>90?'#ef4444':'#8b5cf6'};height:3px;border-radius:3px"></div></div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- Objetivos -->
    ${(fin.objetivos||[]).length ? `
    <div class="fin-section-title">OBJETIVOS DE AHORRO</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
      ${fin.objetivos.map((o,i) => {
        const pct = Math.min(100, Math.round((o.actual/o.meta)*100));
        return `<div class="fin-objetivo">
          <div class="fin-obj-row">
            <span class="fin-obj-nombre">${o.nombre}</span>
            <span class="fin-obj-pct">${pct}% · ${formatCLP(o.actual)} / ${formatCLP(o.meta)}</span>
          </div>
          <div class="fin-obj-bar-wrap"><div class="fin-obj-bar" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Movimientos recientes -->
    <div class="fin-section-title" id="fin-mov-title">ÚLTIMOS MOVIMIENTOS</div>
    <div id="fin-mov-list">
      ${renderMovimientos(fin.movimientos||[], null)}
    </div>

    <!-- Plata Micro -->
    <div class="fin-section-title" style="margin-top:8px;border-top:1px solid var(--border);padding-top:20px">PLATA MICRO</div>
    <div id="fin-micro-container">${renderMicroHTML(getMicroData())}</div>`;
}

function renderMovimientos(movs, catFilter) {
  const sorted = [...movs].sort((a,b) => b.fecha.localeCompare(a.fecha) || b.id - a.id);
  const filtered = catFilter ? sorted.filter(m => m.categoria === catFilter) : sorted.slice(0,30);
  if (!filtered.length) return '<p style="padding:0 16px 12px;color:var(--muted);font-size:13px">Sin movimientos</p>';
  return filtered.map(m => `
    <div class="fin-mov-row">
      <div class="fin-mov-icon">${CAT_ICONS[m.categoria]||'💸'}</div>
      <div class="fin-mov-info">
        <div class="fin-mov-desc">${m.descripcion||m.categoria}</div>
        <div class="fin-mov-meta">${m.categoria} · ${formatFecha(m.fecha)}</div>
      </div>
      <div class="fin-mov-monto ${m.tipo==='ingreso'?'ingreso':'gasto'}">${m.tipo==='ingreso'?'+':'-'}${formatCLP(m.monto)}</div>
      <button class="icon-btn" onclick="deleteMovimiento(${m.id})" style="width:26px;height:26px;font-size:11px;flex-shrink:0">✕</button>
    </div>`).join('');
}

function filterMovBycat(cat) {
  const fin  = getFinData(); if (!fin) return;
  const title= document.getElementById('fin-mov-title');
  const list = document.getElementById('fin-mov-list');
  if (!list) return;
  if (title) title.textContent = cat.toUpperCase() + ' — MOVIMIENTOS';
  list.innerHTML = renderMovimientos(fin.movimientos||[], cat);
}

function saveMovimiento(tipo) {

  const monto = parseInt(document.getElementById('fin-monto')?.value) || 0;

  const cat   = document.getElementById('fin-cat')?.value || 'Otros';

  if (!monto || monto <= 0) { showToast('Ingresa un monto válido'); return; }
  if (!fin.movimientos) fin.movimientos = [];
  fin.movimientos.push({ id:Date.now(), tipo, monto, descripcion:desc, categoria:cat, fecha });
  saveFinData();
  document.getElementById('fin-add-modal')?.remove();
  renderFinView();
  showToast(tipo==='ingreso'?`Ingreso: +${formatCLP(monto)}`:`Gasto: -${formatCLP(monto)}`);

  const micro = getMicroData();
  const idx   = micro.historial.findIndex(h => h.id === entryId);

name: IPTV daily scan

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 02:00 Chile (verano) / 03:00 (invierno, aprox.)
  workflow_dispatch: {}     # permite correrlo manualmente desde la pestaña Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iptv_bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr bot (discovery + verificación)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Publicar canales verificados en la pestaña TV
        env:
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNELS_REPO: ${{ github.repository }}
          CHANNELS_PATH: channels_bot.json
        run: python publish.py

      - name: Commit y push de la DB actualizada
        run: |
          git config user.name "iptv-bot"
          git config user.email "actions@users.noreply.github.com"
          git add iptv.db
          git diff --cached --quiet || git commit -m "Actualiza iptv.db [bot automático]"
          git push
